<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>坦克大战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100vw;
      height: 100vh;
    }

    /* 横屏时改为左右布局 */
    @media (orientation: landscape) {
      #app { flex-direction: row; justify-content: center; align-items: center; }
    }

    #canvas-wrap {
      flex-shrink: 0;
      transform-origin: top left;
      position: relative;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
    }

    #menu-overlay {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }
    #menu-overlay button {
      pointer-events: auto;
      position: absolute;
      background: rgba(255,204,0,0.9);
      border: none;
      border-radius: 8px;
      color: #000;
      font: bold 16px monospace;
      cursor: pointer;
    }

    /* ── 控制器 ── */
    #controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-around;
      width: 100%;
      padding: 8px 16px;
      flex-shrink: 0;
    }

    /* 横屏时控制器竖排在右侧 */
    @media (orientation: landscape) {
      #controls {
        flex-direction: column;
        width: auto;
        height: 100%;
        padding: 12px 8px;
        gap: 12px;
        justify-content: center;
      }
    }

    /* D-pad */
    #dpad {
      position: relative;
      width: 132px;
      height: 132px;
      flex-shrink: 0;
    }
    .dpad-btn {
      position: absolute;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #ccc;
      user-select: none;
      -webkit-user-select: none;
    }
    .dpad-btn.pressed {
      background: rgba(255,204,0,0.4);
      border-color: #ffcc00;
      color: #ffcc00;
    }
    #btn-up    { top: 0;   left: 44px; }
    #btn-down  { top: 88px; left: 44px; }
    #btn-left  { top: 44px; left: 0; }
    #btn-right { top: 44px; left: 88px; }
    #dpad::after {
      content: '';
      position: absolute;
      top: 44px; left: 44px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
    }

    /* 右侧按钮区 */
    #right-btns {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #btn-shoot {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(220,50,50,0.75);
      border: 3px solid rgba(255,100,100,0.8);
      color: #fff;
      font: bold 14px monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    #btn-shoot.pressed {
      background: rgba(255,80,80,0.95);
      border-color: #fff;
    }

    #aux-btns {
      display: flex;
      gap: 8px;
    }
    .aux-btn {
      padding: 5px 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #aaa;
      font: 11px monospace;
      user-select: none;
      -webkit-user-select: none;
    }
    .aux-btn:active { background: rgba(255,255,255,0.25); color: #fff; }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div id="menu-overlay"></div>
    </div>

    <div id="controls">
      <div id="dpad">
        <div class="dpad-btn" id="btn-up">▲</div>
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-right">▶</div>
        <div class="dpad-btn" id="btn-down">▼</div>
      </div>

      <div id="right-btns">
        <div id="btn-shoot">射击</div>
        <div id="aux-btns">
          <div class="aux-btn" id="btn-pause">暂停</div>
          <div class="aux-btn" id="btn-music">音乐</div>
        </div>
      </div>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="game.js"></script>
  <script src="controls.js"></script>
</body>
</html>
