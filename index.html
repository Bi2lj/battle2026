<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>坦克大战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
      touch-action: none;
    }

    /* ── 竖屏提示 ── */
    #rotate-tip {
      display: none;
      position: fixed; inset: 0;
      background: #000;
      color: #ffcc00;
      font: bold 20px monospace;
      text-align: center;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    #rotate-tip span { font-size: 48px; margin-bottom: 16px; }
    @media (orientation: portrait) {
      #rotate-tip { display: flex; }
    }

    /* ── 主布局（横屏） ── */
    #app {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    /* canvas 缩放容器 */
    #canvas-wrap {
      flex-shrink: 0;
      transform-origin: top left;
    }

    #gameCanvas {
      display: block;
      border: 2px solid #444;
      image-rendering: pixelated;
    }

    /* ── 虚拟控制器 ── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 12px;
      flex-shrink: 0;
    }

    /* D-pad */
    #dpad {
      position: relative;
      width: 132px;
      height: 132px;
    }
    .dpad-btn {
      position: absolute;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #ccc;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.08s;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(255,204,0,0.35);
      border-color: #ffcc00;
      color: #ffcc00;
    }
    #btn-up    { top: 0;   left: 44px; }
    #btn-down  { top: 88px; left: 44px; }
    #btn-left  { top: 44px; left: 0; }
    #btn-right { top: 44px; left: 88px; }
    /* center dot */
    #dpad::after {
      content: '';
      position: absolute;
      top: 44px; left: 44px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
    }

    /* 射击按钮 */
    #btn-shoot {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(220,50,50,0.7);
      border: 3px solid rgba(255,100,100,0.8);
      color: #fff;
      font: bold 14px monospace;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.08s;
    }
    #btn-shoot:active, #btn-shoot.pressed {
      background: rgba(255,80,80,0.9);
      border-color: #fff;
    }

    /* 辅助按钮行（暂停、音乐） */
    #aux-btns {
      display: flex;
      gap: 10px;
    }
    .aux-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #aaa;
      font: 11px monospace;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .aux-btn:active { background: rgba(255,255,255,0.25); color: #fff; }

    /* 菜单触控按钮（覆盖在 canvas 上） */
    #menu-overlay {
      position: absolute;
      pointer-events: none;
    }
    #menu-overlay button {
      pointer-events: auto;
      position: absolute;
      background: rgba(255,204,0,0.85);
      border: none;
      border-radius: 8px;
      color: #000;
      font: bold 16px monospace;
      padding: 10px 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="rotate-tip">
    <span>📱</span>
    请横屏游玩
  </div>

  <div id="app">
    <div id="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div id="menu-overlay"></div>
    </div>

    <div id="controls">
      <div id="dpad">
        <div class="dpad-btn" id="btn-up">▲</div>
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-right">▶</div>
        <div class="dpad-btn" id="btn-down">▼</div>
      </div>

      <div id="btn-shoot">射击</div>

      <div id="aux-btns">
        <div class="aux-btn" id="btn-pause">暂停</div>
        <div class="aux-btn" id="btn-music">音乐</div>
      </div>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="game.js"></script>
  <script src="controls.js"></script>
</body>
</html>
